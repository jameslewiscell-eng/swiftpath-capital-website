<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=300, initial-scale=1">
<meta name="ad.size" content="width=300,height=250">
<title>SwiftPath Capital - DSCR Rental Loans - 300x250</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .ad-container {
    display: block;
    text-decoration: none;
    color: inherit;
    width: 300px;
    height: 250px;
    overflow: hidden;
    position: relative;
    background: linear-gradient(135deg, #1a3a4f 0%, #4A7A9D 100%);
    font-family: 'Inter', sans-serif;
    border: 1px solid #3b627e;
    cursor: pointer;
  }

  .accent-bar {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 4px;
    background: linear-gradient(90deg, #c5a35a, #e0c882, #c5a35a);
  }

  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    opacity: 0;
  }

  .slide-1 { animation: fadeSlide 8s infinite; }
  .slide-2 { animation: fadeSlide 8s infinite 2s; }
  .slide-3 { animation: fadeSlide 8s infinite 4s; }

  @keyframes fadeSlide {
    0%   { opacity: 0; transform: translateY(8px); }
    5%   { opacity: 1; transform: translateY(0); }
    25%  { opacity: 1; transform: translateY(0); }
    30%  { opacity: 0; transform: translateY(-8px); }
    100% { opacity: 0; }
  }

  .headline {
    color: #ffffff;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .highlight { color: #c5a35a; }

  .subtext {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 400;
    line-height: 1.4;
    margin-bottom: 12px;
  }

  .stat {
    font-size: 36px;
    font-weight: 800;
    color: #c5a35a;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-label {
    color: rgba(255,255,255,0.9);
    font-size: 14px;
    font-weight: 600;
  }

  .features {
    list-style: none;
    padding: 0;
    margin: 8px 0;
    text-align: left;
  }

  .features li {
    color: rgba(255,255,255,0.9);
    font-size: 12px;
    padding: 3px 0;
    padding-left: 16px;
    position: relative;
  }

  .features li::before {
    content: '✓';
    color: #c5a35a;
    position: absolute;
    left: 0;
    font-weight: 700;
  }

  .cta {
    display: inline-block;
    background: linear-gradient(135deg, #c5a35a, #d4b56c);
    color: #1a3a4f;
    padding: 10px 24px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    animation: pulse 2s ease-in-out infinite 5s;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(197,163,90,0.4); }
  }

  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    background: rgba(0,0,0,0.25);
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .brand-name {
    color: #ffffff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .tagline {
    color: #c5a35a;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .corner-accent {
    position: absolute;
    bottom: 36px; right: -20px;
    width: 80px; height: 80px;
    border: 2px solid rgba(197,163,90,0.15);
    border-radius: 50%;
  }

  .corner-accent-2 {
    position: absolute;
    top: -30px; left: -30px;
    width: 100px; height: 100px;
    border: 2px solid rgba(255,255,255,0.05);
    border-radius: 50%;
  }
</style>
</head>
<body>
<a class="ad-container" href="https://swiftpathcapital.com/loans/dscr" target="_blank" rel="noopener noreferrer">
  <div class="accent-bar"></div>
  <div class="corner-accent"></div>
  <div class="corner-accent-2"></div>

  <!-- Slide 1: Hook -->
  <div class="slide slide-1">
    <div class="headline">DSCR<br><span class="highlight">Rental Loans</span></div>
    <div class="subtext">Qualify on property cash flow.<br>No W-2s. No income docs.</div>
  </div>

  <!-- Slide 2: Features -->
  <div class="slide slide-2">
    <div class="headline" style="font-size:16px; margin-bottom:8px;">Built for <span class="highlight">Investors</span></div>
    <ul class="features">
      <li>30-year fixed options</li>
      <li>No limit on properties</li>
      <li>LTR &amp; Airbnb eligible</li>
      <li>Cash-out refinance available</li>
    </ul>
  </div>

  <!-- Slide 3: CTA -->
  <div class="slide slide-3">
    <div class="headline" style="font-size:18px;">Scale Your<br><span class="highlight">Rental Portfolio</span></div>
    <span class="cta">Get Your Rate</span>
  </div>

  <div class="bottom-bar">
    <span class="brand-name">SWIFTPATH CAPITAL</span>
    <span class="tagline">FIRST. FAST. FUNDED.</span>
  </div>
</a>
<script>
  (function () {
    var adLink = document.querySelector('.ad-container');
    if (adLink && window.clickTag) {
      adLink.href = window.clickTag;
    }
  })();
</script>
</body>
</html>
