<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=320, initial-scale=1">
<meta name="ad.size" content="width=320,height=50">
<title>SwiftPath Capital - Fix &amp; Flip Loans - 320x50</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .ad-container {
    text-decoration: none;
    color: inherit;
    width: 320px;
    height: 50px;
    overflow: hidden;
    position: relative;
    background: linear-gradient(135deg, #1a3a4f 0%, #4A7A9D 100%);
    font-family: 'Inter', sans-serif;
    border: 1px solid #3b627e;
    cursor: pointer;
    display: flex;
    align-items: center;
  }

  .accent-bar {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, #c5a35a, #e0c882, #c5a35a);
  }

  .content-section {
    flex: 1;
    position: relative;
    height: 100%;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 12px;
    opacity: 0;
  }

  .slide-1 { animation: fadeSlide 8s infinite; }
  .slide-2 { animation: fadeSlide 8s infinite 4s; }

  @keyframes fadeSlide {
    0%   { opacity: 0; }
    5%   { opacity: 1; }
    45%  { opacity: 1; }
    50%  { opacity: 0; }
    100% { opacity: 0; }
  }

  .text-group {
    flex: 1;
  }

  .headline {
    color: #ffffff;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.2;
  }

  .highlight { color: #c5a35a; }

  .subtext {
    color: rgba(255,255,255,0.75);
    font-size: 10px;
    font-weight: 400;
    margin-top: 1px;
  }

  .cta-section {
    flex: 0 0 auto;
    padding: 0 10px;
  }

  .cta {
    display: inline-block;
    background: #c5a35a;
    color: #1a3a4f;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-decoration: none;
    text-transform: uppercase;
    white-space: nowrap;
  }
</style>
</head>
<body>
<a class="ad-container" href="https://swiftpathcapital.com/loans/fix-and-flip" target="_blank" rel="noopener noreferrer">
  <div class="accent-bar"></div>

  <div class="content-section">
    <div class="slide slide-1">
      <div class="text-group">
        <div class="headline">Fix &amp; Flip <span class="highlight">Loans</span> — Close in 7 Days</div>
        <div class="subtext">SwiftPath Capital · No tax returns required</div>
      </div>
    </div>

    <div class="slide slide-2">
      <div class="text-group">
        <div class="headline"><span class="highlight">Same-Day</span> Term Sheets Available</div>
        <div class="subtext">SwiftPath Capital · First. Fast. Funded.</div>
      </div>
    </div>
  </div>

  <div class="cta-section">
    <span class="cta">Get Rate</span>
  </div>
</a>
<script>
  (function () {
    var adLink = document.querySelector('.ad-container');
    if (adLink && window.clickTag) {
      adLink.href = window.clickTag;
    }
  })();
</script>
</body>
</html>
