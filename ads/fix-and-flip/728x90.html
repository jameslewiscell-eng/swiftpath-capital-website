<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=728, initial-scale=1">
<meta name="ad.size" content="width=728,height=90">
<title>SwiftPath Capital - Fix &amp; Flip Loans - 728x90</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .ad-container {
    width: 728px;
    height: 90px;
    overflow: hidden;
    position: relative;
    background: linear-gradient(135deg, #1a3a4f 0%, #4A7A9D 100%);
    font-family: 'Inter', sans-serif;
    border: 1px solid #3b627e;
    cursor: pointer;
    display: flex;
    align-items: center;
  }

  .accent-bar {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 3px;
    background: linear-gradient(90deg, #c5a35a, #e0c882, #c5a35a);
  }

  /* Left section: brand */
  .brand-section {
    flex: 0 0 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    border-right: 1px solid rgba(197,163,90,0.3);
    height: 100%;
  }

  .brand-name {
    color: #ffffff;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .tagline {
    color: #c5a35a;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  /* Middle section: animated content */
  .content-section {
    flex: 1;
    position: relative;
    height: 100%;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 24px;
    opacity: 0;
  }

  .slide-1 { animation: fadeSlide 8s infinite; }
  .slide-2 { animation: fadeSlide 8s infinite 2.5s; }
  .slide-3 { animation: fadeSlide 8s infinite 5s; }

  @keyframes fadeSlide {
    0%   { opacity: 0; transform: translateX(15px); }
    5%   { opacity: 1; transform: translateX(0); }
    28%  { opacity: 1; transform: translateX(0); }
    33%  { opacity: 0; transform: translateX(-15px); }
    100% { opacity: 0; }
  }

  .headline {
    color: #ffffff;
    font-size: 18px;
    font-weight: 800;
    line-height: 1.2;
  }

  .highlight { color: #c5a35a; }

  .subtext {
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    margin-left: 20px;
    line-height: 1.3;
  }

  .stat {
    font-size: 28px;
    font-weight: 800;
    color: #c5a35a;
    margin-right: 12px;
    white-space: nowrap;
  }

  /* Right section: CTA */
  .cta-section {
    flex: 0 0 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
  }

  .cta {
    display: inline-block;
    background: linear-gradient(135deg, #c5a35a, #d4b56c);
    color: #1a3a4f;
    padding: 10px 20px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
    animation: pulse 2s ease-in-out infinite 5s;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); box-shadow: 0 0 15px rgba(197,163,90,0.4); }
  }
</style>
</head>
<body>
<div class="ad-container" onclick="window.open(window.clickTag || 'https://swiftpathcapital.com/loans/fix-and-flip')">
  <div class="accent-bar"></div>

  <div class="brand-section">
    <div class="brand-name">SwiftPath<br>Capital</div>
    <div class="tagline">FIRST. FAST. FUNDED.</div>
  </div>

  <div class="content-section">
    <div class="slide slide-1">
      <div class="headline">Fix &amp; Flip <span class="highlight">Loans</span></div>
      <div class="subtext">Close in 7 days. No tax returns.<br>Same-day term sheets available.</div>
    </div>

    <div class="slide slide-2">
      <div class="stat">7 Days</div>
      <div>
        <div class="headline" style="font-size:15px;">Average Close Time</div>
        <div class="subtext" style="margin-left:0; margin-top:2px;">Asset-based underwriting. Interest-only payments.</div>
      </div>
    </div>

    <div class="slide slide-3">
      <div class="headline" style="font-size:16px;">Ready to Fund Your Next Flip<span class="highlight">?</span></div>
      <div class="subtext">15+ national lenders. Competitive rates.</div>
    </div>
  </div>

  <div class="cta-section">
    <a class="cta" href="#">Get Your Rate</a>
  </div>
</div>
</body>
</html>
